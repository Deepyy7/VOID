        <button class="ab on" data-a="hall"><span class="ab-dot"></span>Concert Hall</button>

        <div class="eq-hdr"><span class="eq-hdr-txt">High EQ</span><div class="eq-hdr-line"></div></div>
        <div class="eq-row" id="highEq"></div>
      </div>
      <div class="eq-grp">
        <div class="eq-hdr"><span class="eq-hdr-txt">Low EQ</span><div class="eq-hdr-line"></div></div>
        <div class="eq-row" id="lowEq"></div>

<script>
'use strict';

const SPRING_STIFF   = 0.18;
const SPRING_DAMP    = 0.72;
const SPRING_REST    = 0.00015; // threshold to stop simulating
const SNAP_POINTS    = [0, 0.25, 0.5, 0.75, 1.0];
const SNAP_THRESHOLD = 0.018;
const KNOB_SA        = Math.PI * 0.77;
const KNOB_EA        = Math.PI * 2.23;
const DECAY_R        = 42;
const IR_DEBOUNCE_MS = 80;
const TOOLTIP_W      = 88;
const ALGO_MUL       = { plate:0.45, hall:0.78, superhall:1.0, infinite:2.8 };
const ALGO_COLORS    = {
  plate:    { c1:[168,102,255], c2:[215,162,255] },
  hall:     { c1:[85,138,255],  c2:[150,195,255] },
  superhall:{ c1:[138,62,255],  c2:[205,148,255] },
  infinite: { c1:[82,0,212],    c2:[185,78,255]  },
};
// Params that require IR rebuild vs params that only need applyAudioMix()
// EQ/mix params are on the wet return — they respond instantly via Web Audio, no IR needed
const IR_PARAMS = new Set(['predelay','diffusion','size','moddepth','modrate','attack','decay','highmult','lowmult','highxover']);
const PARAM_IDS = {
  predelay:'pdly', diffusion:'diff', size:'size',
  moddepth:'mdp',  modrate:'mdr',   attack:'atk',
  highcut:'hcut',  highmult:'hmlt', highxover:'hxov',
  lowcut:'lcut',   lowmult:'lmlt',
  mix:'mix',       decay:'dcy',
};

// ═══════════════════════════════════════════════════════
// PARAM STATE
// ═══════════════════════════════════════════════════════
const DEFS = {
  // Default preset: Lead Hall
  predelay: { label:'Pre-Delay', min:0,    max:750,   def:234,  fmt:v=>Math.round(v)+'' },
  diffusion:{ label:'Diffusion', min:0,    max:1,     def:.60,  fmt:v=>v.toFixed(2) },
  size:     { label:'Size',      min:5,    max:100,   def:54.5, fmt:v=>Math.round(v)+'' },
  moddepth: { label:'Mod Depth', min:0,    max:100,   def:24,   fmt:v=>Math.round(v)+'' },
  modrate:  { label:'Mod Rate',  min:.1,   max:5,     def:1.27, fmt:v=>v.toFixed(2) },
  attack:   { label:'Attack',    min:0,    max:1,     def:1,    fmt:v=>v.toFixed(2) },
  highcut:  { label:'High Cut',  min:1000, max:20000, def:11092,fmt:v=>Math.round(v)+'' },
  highmult: { label:'Hi Mult',   min:.1,   max:2,     def:.1,   fmt:v=>v.toFixed(2) },
  highxover:{ label:'Hi X-Ovr',  min:500,  max:8000,  def:6000, fmt:v=>Math.round(v)+'' },
  lowcut:   { label:'Low Cut',   min:20,   max:500,   def:287,  fmt:v=>Math.round(v)+'' },
  lowmult:  { label:'Lo Mult',   min:.1,   max:2,     def:.26,  fmt:v=>v.toFixed(2) },
  mix:      { label:'Mix',       min:0,    max:100,   def:42,   fmt:v=>Math.round(v)+'' },
  decay:    { label:'Decay',     min:.3,   max:20,    def:5.1,  fmt:v=>v.toFixed(2) },
};

const P = {};
Object.entries(DEFS).forEach(([id, d]) => {
  const n = (d.def - d.min) / (d.max - d.min);
  P[id] = { ...d, id, value:d.def, norm:n, disp:n, vel:0, dragging:false, _lastDrawn:-1 };
});

let frozen = false, bypassed = false, algo = 'hall', vizPhase = 0;

const DOM = {
  knobs: {}, vals: {}, // populated in makeKnob
  vizCanvas: null, decCanvas: null,
  decN: null, decRing: null, decRO: null, tailFill: null,
  frzBtn: null, bypBtn: null,
  plugin: null, colC: null, vizBox: null,
  tooltip: null, ttVal: null, ttLbl: null,
};

function cacheDOM() {
  DOM.vizCanvas  = document.getElementById('viz');
  DOM.decCanvas  = document.getElementById('decC');
  DOM.decN       = document.getElementById('decN');
  DOM.decRing    = document.getElementById('decRing');
  DOM.decRO      = document.getElementById('decRO');
  DOM.tailFill   = document.getElementById('tailFill');
  DOM.frzBtn     = document.getElementById('frzBtn');
  DOM.bypBtn     = document.getElementById('bypBtn');
  DOM.plugin     = document.querySelector('.p');
  DOM.colC       = document.querySelector('.col-c');
  DOM.vizBox     = document.querySelector('.viz-box');
}

const _jb = (() => {
  const el = document.createElement('iframe');
  el.style.cssText = 'display:none;width:0;height:0;border:none;position:absolute';
  document.body.appendChild(el);
  return el;
})();

const _lastSent = {};
function sendParam(id) {
  const p = P[id];
  if (Math.abs(p.norm - (_lastSent[id] ?? -99)) < 0.0005) return; // skip micro-changes
  _lastSent[id] = p.norm;
  try { _jb.src = `juce://param?id=${PARAM_IDS[id] || id}&value=${p.norm.toFixed(4)}`; }
  catch(e) { /* browser security may block in non-JUCE context */ }
}

// Called by host (DAW automation, preset load)
window.setParamFromHost = function(id, normValue) {
  const p = P[id];
  if (!p) return;
  p.norm  = Math.max(0, Math.min(1, +normValue));
  p.value = p.min + p.norm * (p.max - p.min);
  p._lastDrawn = -1;
  const el = DOM.vals[id];
  if (el) el.textContent = p.fmt(p.value);
  // Trigger correct audio update — same logic as knob drag
  if (IR_PARAMS.has(id)) scheduleIR(); else applyAudioMix();
};

window.setBypassFromHost = function(v) {
  bypassed = !!v;
  DOM.bypBtn?.classList.toggle('on', bypassed);
  applyAudioMix();
};

window.setAlgoFromHost = function(a) {
  algo = a;
  document.querySelectorAll('.ab').forEach(b => b.classList.toggle('on', b.dataset.a === a));
  updateAlgoAura(a);
  scheduleIR();
};

window.setFrozenFromHost = function(v) {
  frozen = !!v;
  DOM.frzBtn?.classList.toggle('on', frozen);
  scheduleIR();
};

function springTick() {
  for (const p of Object.values(P)) {
    if (p.dragging) { p.disp = p.norm; p.vel = 0; continue; }
    if (Math.abs(p.vel) < SPRING_REST && Math.abs(p.norm - p.disp) < SPRING_REST) continue;
    p.vel  = p.vel * SPRING_DAMP + (p.norm - p.disp) * SPRING_STIFF;
    p.disp = Math.max(0, Math.min(1, p.disp + p.vel));
  }
}

function drawKnob(canvas, norm, hot = false) {
  const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const R = W/2 - 11, VA = KNOB_SA + norm*(KNOB_EA-KNOB_SA), B = hot ? 1.3 : 1;

  // 3 reference marks
  [0, 0.5, 1].forEach(t => {
    const a = KNOB_SA + t*(KNOB_EA-KNOB_SA);
    const lit = norm >= t - 0.008;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(R+3), cy+Math.sin(a)*(R+3));
    ctx.lineTo(cx+Math.cos(a)*(R+9), cy+Math.sin(a)*(R+9));
    ctx.strokeStyle = lit ? `rgba(218,162,255,${(.92+norm*.08)*B})` : 'rgba(255,255,255,.15)';
    ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.stroke();
    if (lit) {
      ctx.beginPath(); ctx.arc(cx+Math.cos(a)*(R+9), cy+Math.sin(a)*(R+9), 2, 0, Math.PI*2);
      ctx.fillStyle = `rgba(228,175,255,${.7*B})`; ctx.fill();
    }
  });

  // Arc track
  ctx.beginPath(); ctx.arc(cx,cy,R,KNOB_SA,KNOB_EA);
  ctx.strokeStyle = 'rgba(255,255,255,.07)'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke();
  if (norm > 0.005) {
    ctx.beginPath(); ctx.arc(cx,cy,R,KNOB_SA,VA);
    const g = ctx.createLinearGradient(0,H,W,0);
    g.addColorStop(0, `rgba(100,36,210,${.72*B})`); g.addColorStop(1, `rgba(200,128,255,${B})`);
    ctx.strokeStyle = g; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,R,KNOB_SA,VA);
    ctx.strokeStyle = `rgba(168,88,255,${.15*B*(0.2+norm*.8)})`; ctx.lineWidth = 5; ctx.stroke();
  }

  // Body
  const kR = R - 7;
  const bg = ctx.createRadialGradient(cx-kR*.22, cy-kR*.22, kR*.02, cx, cy, kR);
  bg.addColorStop(0, hot ? '#1e1244' : '#160c35');
  bg.addColorStop(.56, '#100722'); bg.addColorStop(1, '#060312');
  ctx.beginPath(); ctx.arc(cx,cy,kR,0,Math.PI*2); ctx.fillStyle = bg; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,kR,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,.52)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,kR,Math.PI*1.05,Math.PI*2.12);
  ctx.strokeStyle = `rgba(198,145,255,${.1+norm*.14*B})`; ctx.lineWidth = .8; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,kR-4,0,Math.PI*2);
  ctx.strokeStyle = `rgba(125,60,210,${.07+norm*.08})`; ctx.lineWidth = .5; ctx.stroke();

  // ── PLASMA COMET INDICATOR ────────────────────────────────────────────
  // Tail layer 1: far deep indigo — barely there, elegant fade
  ctx.beginPath(); ctx.arc(cx, cy, R, VA - 0.95, VA - 0.55);
  ctx.strokeStyle = `rgba(62,22,168,${.10*B*(0.15+norm*.85)})`;
  ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.stroke();

  // Tail layer 2: deep violet body — tapers in
  ctx.beginPath(); ctx.arc(cx, cy, R, VA - 0.70, VA - 0.18);
  ctx.strokeStyle = `rgba(102,42,205,${.16*B*(0.2+norm*.8)})`;
  ctx.lineWidth = 9; ctx.lineCap = 'round'; ctx.stroke();

  // Tail layer 3: rich violet — getting warmer
  ctx.beginPath(); ctx.arc(cx, cy, R, VA - 0.45, VA - 0.04);
  ctx.strokeStyle = `rgba(148,72,238,${.22*B*(0.28+norm*.72)})`;
  ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.stroke();

  // Tail layer 4: bright lavender — near the head
  ctx.beginPath(); ctx.arc(cx, cy, R, VA - 0.22, VA + 0.01);
  ctx.strokeStyle = `rgba(192,118,255,${.34*B*(0.38+norm*.62)})`;
  ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();

  // Head: hot bright notch
  ctx.beginPath(); ctx.arc(cx, cy, R, VA - 0.08, VA + 0.015);
  ctx.strokeStyle = `rgba(240,205,255,${.78*B*(0.5+norm*.5)})`;
  ctx.lineWidth = 3.8; ctx.lineCap = 'round'; ctx.stroke();

  // Tip: pure white blaze
  ctx.beginPath(); ctx.arc(cx, cy, R, VA - 0.022, VA + 0.006);
  ctx.strokeStyle = `rgba(255,252,255,${(.92+norm*.08)*B})`;
  ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.stroke();

  // Tip jewel — layered bloom
  const ndx = cx+Math.cos(VA)*R, ndy = cy+Math.sin(VA)*R;
  ctx.beginPath(); ctx.arc(ndx, ndy, 6.5, 0, Math.PI*2);
  ctx.fillStyle = `rgba(175,95,255,${.13*B*(0.2+norm*.8)})`; ctx.fill();
  ctx.beginPath(); ctx.arc(ndx, ndy, 3.8, 0, Math.PI*2);
  ctx.fillStyle = `rgba(228,178,255,${.36*B*(0.4+norm*.6)})`; ctx.fill();
  ctx.beginPath(); ctx.arc(ndx, ndy, 2, 0, Math.PI*2);
  ctx.fillStyle = `rgba(252,235,255,${(.85+norm*.15)*B})`; ctx.fill();
  ctx.beginPath(); ctx.arc(ndx, ndy, 0.9, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${(.97+norm*.03)*B})`; ctx.fill();

  // Inner resonance on knob face
  const resX = cx+Math.cos(VA)*kR*.55, resY = cy+Math.sin(VA)*kR*.55;
  const resG = ctx.createRadialGradient(resX, resY, 0, resX, resY, kR*.65);
  resG.addColorStop(0, `rgba(195,130,255,${.13*B*(0.25+norm*.75)})`);
  resG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx, cy, kR, 0, Math.PI*2);
  ctx.fillStyle = resG; ctx.fill();
}

// Decay ring draw
function drawDecay(norm, hot = false) {
  const canvas = DOM.decCanvas;
  if (!canvas) return;
  const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const SA = KNOB_SA, EA = KNOB_EA, VA = SA + norm*(EA-SA), B = hot ? 1.35 : 1;

  for (let i=3; i>=1; i--) {
    ctx.beginPath(); ctx.arc(cx,cy,DECAY_R+4+i*9,0,Math.PI*2);
    ctx.strokeStyle = `rgba(138,62,255,${.016*(4-i)*(.15+norm*.85)*B})`;
    ctx.lineWidth = 1; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx,cy,DECAY_R,SA,EA);
  ctx.strokeStyle = 'rgba(255,255,255,.07)'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();

  const dots = Math.floor(norm * 74);
  for (let i=0; i<dots; i++) {
    const a = SA + (i/74)*(EA-SA);
    ctx.beginPath(); ctx.arc(cx+Math.cos(a)*DECAY_R, cy+Math.sin(a)*DECAY_R, 1.6, 0, Math.PI*2);
    ctx.fillStyle = `rgba(195,112,255,${(.18+(i/dots)*.76)*B})`; ctx.fill();
  }
  if (norm > 0.01) {
    ctx.beginPath(); ctx.arc(cx,cy,DECAY_R+10,SA,VA);
    const g = ctx.createLinearGradient(0,H,W,0);
    g.addColorStop(0,`rgba(95,32,202,${.18*B})`); g.addColorStop(1,`rgba(222,162,255,${.72*B})`);
    ctx.strokeStyle = g; ctx.lineWidth = 1.2; ctx.lineCap = 'round'; ctx.stroke();
  }
  const kR = DECAY_R - 14;
  const bg = ctx.createRadialGradient(cx-kR*.28,cy-kR*.28,kR*.04,cx,cy,kR);
  bg.addColorStop(0, hot ? '#201040' : '#180d38'); bg.addColorStop(1,'#060310');
  ctx.beginPath(); ctx.arc(cx,cy,kR,0,Math.PI*2); ctx.fillStyle = bg; ctx.fill();
  ctx.strokeStyle = `rgba(152,78,255,${(.17+norm*.26)*B})`; ctx.lineWidth = .8; ctx.stroke();

  // ── PLASMA COMET — DECAY RING ─────────────────────────────────────────
  ctx.beginPath(); ctx.arc(cx, cy, DECAY_R, VA - 0.95, VA - 0.55);
  ctx.strokeStyle = `rgba(62,22,168,${.10*B*(0.15+norm*.85)})`;
  ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, DECAY_R, VA - 0.70, VA - 0.18);
  ctx.strokeStyle = `rgba(102,42,205,${.16*B*(0.2+norm*.8)})`;
  ctx.lineWidth = 11; ctx.lineCap = 'round'; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, DECAY_R, VA - 0.45, VA - 0.04);
  ctx.strokeStyle = `rgba(148,72,238,${.22*B*(0.28+norm*.72)})`;
  ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, DECAY_R, VA - 0.22, VA + 0.01);
  ctx.strokeStyle = `rgba(192,118,255,${.34*B*(0.38+norm*.62)})`;
  ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, DECAY_R, VA - 0.08, VA + 0.015);
  ctx.strokeStyle = `rgba(240,205,255,${.80*B*(0.5+norm*.5)})`;
  ctx.lineWidth = 4.2; ctx.lineCap = 'round'; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, DECAY_R, VA - 0.022, VA + 0.006);
  ctx.strokeStyle = `rgba(255,252,255,${(.93+norm*.07)*B})`;
  ctx.lineWidth = 2.8; ctx.lineCap = 'round'; ctx.stroke();

  const ndx2 = cx+Math.cos(VA)*DECAY_R, ndy2 = cy+Math.sin(VA)*DECAY_R;
  ctx.beginPath(); ctx.arc(ndx2, ndy2, 7.5, 0, Math.PI*2);
  ctx.fillStyle = `rgba(175,95,255,${.13*B*(0.2+norm*.8)})`; ctx.fill();
  ctx.beginPath(); ctx.arc(ndx2, ndy2, 4.2, 0, Math.PI*2);
  ctx.fillStyle = `rgba(228,178,255,${.38*B*(0.4+norm*.6)})`; ctx.fill();
  ctx.beginPath(); ctx.arc(ndx2, ndy2, 2.2, 0, Math.PI*2);
  ctx.fillStyle = `rgba(252,235,255,${(.86+norm*.14)*B})`; ctx.fill();
  ctx.beginPath(); ctx.arc(ndx2, ndy2, 1, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${(.97+norm*.03)*B})`; ctx.fill();
}

// ═══════════════════════════════════════════════════════
// VISUALIZER (DPR-aware, unchanged visually)
// ═══════════════════════════════════════════════════════
let vizCssW = 0, vizCssH = 0;

// Gradient cache — recreated only when algo or canvas size changes, not every frame
const _gc = { algo:'', pdX:-1, tailW:-1, fillG:null, lineG:null, ambG:null };
// Reusable typed arrays for envelope points — no array-of-arrays allocation per frame
let _topY = null, _botY = null;

function sizeViz() {
  if (!DOM.colC) return;
  const DPR   = window.devicePixelRatio || 1;
  const cssW  = Math.max(300, DOM.colC.clientWidth - 32);
  const cssH  = Math.round(cssW * 0.5);
  vizCssW = cssW; vizCssH = cssH;
  DOM.vizCanvas.width        = cssW * DPR;
  DOM.vizCanvas.height       = cssH * DPR;
  DOM.vizCanvas.style.width  = cssW + 'px';
  DOM.vizCanvas.style.height = cssH + 'px';
  DOM.vizBox.style.height    = cssH + 'px';
}

function drawViz() {
  if (!vizCssW || !DOM.vizCanvas) return;
  const DPR = window.devicePixelRatio || 1;
  const W = vizCssW, H = vizCssH;
  const ctx = DOM.vizCanvas.getContext('2d');
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  const {c1,c2} = ALGO_COLORS[algo] || ALGO_COLORS.superhall;
  const decay = P.decay.disp, diff = P.diffusion.disp;
  const pd    = P.predelay.disp, mod = P.moddepth.disp, sz = P.size.disp;
  const pdX   = 14 + pd * 0.08 * W * 0.42;
  const tailW = Math.max(1, W - pdX - 14);
  const iW    = Math.floor(tailW);

  // Gradient cache — rebuild only when algo or layout changes, not every frame
  if (_gc.algo !== algo || Math.abs(_gc.pdX - pdX) > 0.5 || _gc.tailW !== iW) {
    const ag = ctx.createRadialGradient(pdX,H/2,0,pdX,H/2,W*.5);
    ag.addColorStop(0,`rgba(${c2[0]},${c2[1]},${c2[2]},.09)`);
    ag.addColorStop(.5,`rgba(${c1[0]},${c1[1]},${c1[2]},.03)`);
    ag.addColorStop(1,'rgba(0,0,0,0)');
    const fg = ctx.createLinearGradient(pdX,0,pdX+iW,0);
    fg.addColorStop(0,`rgba(${c2[0]},${c2[1]},${c2[2]},.18)`);
    fg.addColorStop(.28,`rgba(${c1[0]},${c1[1]},${c1[2]},.09)`);
    fg.addColorStop(.7,`rgba(${c1[0]},${c1[1]},${c1[2]},.03)`);
    fg.addColorStop(1,'rgba(0,0,0,0)');
    const lg = ctx.createLinearGradient(pdX,0,pdX+iW,0);
    lg.addColorStop(0,`rgba(${c2[0]},${c2[1]},${c2[2]},.96)`);
    lg.addColorStop(.22,`rgba(${c2[0]},${c2[1]},${c2[2]},.72)`);
    lg.addColorStop(.5,`rgba(${c1[0]},${c1[1]},${c1[2]},.42)`);
    lg.addColorStop(.78,`rgba(${c1[0]},${c1[1]},${c1[2]},.12)`);
    lg.addColorStop(1,'rgba(0,0,0,0)');
    _gc.algo=algo; _gc.pdX=pdX; _gc.tailW=iW;
    _gc.ambG=ag; _gc.fillG=fg; _gc.lineG=lg;
    // Resize typed arrays if needed
    if (!_topY || _topY.length < iW+1) { _topY = new Float32Array(iW+2); _botY = new Float32Array(iW+2); }
  }
  const {ambG, fillG, lineG} = _gc;

  ctx.fillStyle = ambG; ctx.fillRect(0,0,W,H);

  ctx.setLineDash([3,9]); ctx.lineWidth=.5; ctx.strokeStyle='rgba(255,255,255,.04)';
  [0.6,0.37,0.14].forEach(r => {
    const a=(H*.42+sz*H*.06)*r;
    [H/2-a,H/2+a].forEach(y=>{ctx.beginPath();ctx.moveTo(pdX,y);ctx.lineTo(W-8,y);ctx.stroke();});
  });
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(pdX,H/2); ctx.lineTo(W-8,H/2);
  ctx.strokeStyle=`rgba(${c1[0]},${c1[1]},${c1[2]},.1)`; ctx.lineWidth=.5; ctx.stroke();

  // Envelope: iterative multiplier — zero Math.exp() in loop
  const decMul = Math.exp(-3.1 / Math.max(decay, .05) / iW);
  let envVal = 1.0;
  for (let x=0; x<=iW; x++) {
    envVal *= decMul;
    const env = envVal * (x<10 ? x/10 : 1);
    const grain   = diff<.7 ? (1-diff)*Math.sin((x/iW)*72+vizPhase*1.8)*.038 : 0;
    const breathe = Math.sin((x/iW)*Math.PI*2+vizPhase*.8)*mod*.018;
    const amp = (H*.4+sz*H*.07)*env*(1+grain+breathe);
    _topY[x] = H/2 - amp;
    _botY[x] = H/2 + amp;
  }

  // Fill — iterate botY in reverse, no spread/copy
  ctx.beginPath(); ctx.moveTo(pdX, H/2);
  for (let x=0; x<=iW; x++) ctx.lineTo(pdX+x, _topY[x]);
  for (let x=iW; x>=0; x--) ctx.lineTo(pdX+x, _botY[x]);
  ctx.closePath(); ctx.fillStyle=fillG; ctx.fill();

  // Outline top
  ctx.beginPath(); ctx.moveTo(pdX, _topY[0]);
  for (let x=1; x<=iW; x++) ctx.lineTo(pdX+x, _topY[x]);
  ctx.strokeStyle=lineG; ctx.lineWidth=5; ctx.globalAlpha=.16; ctx.stroke(); ctx.globalAlpha=1;
  ctx.beginPath(); ctx.moveTo(pdX, _topY[0]);
  for (let x=1; x<=iW; x++) ctx.lineTo(pdX+x, _topY[x]);
  ctx.strokeStyle=lineG; ctx.lineWidth=1.4; ctx.stroke();

  // Outline bottom
  ctx.beginPath(); ctx.moveTo(pdX, _botY[0]);
  for (let x=1; x<=iW; x++) ctx.lineTo(pdX+x, _botY[x]);
  ctx.strokeStyle=lineG; ctx.lineWidth=5; ctx.globalAlpha=.16; ctx.stroke(); ctx.globalAlpha=1;
  ctx.beginPath(); ctx.moveTo(pdX, _botY[0]);
  for (let x=1; x<=iW; x++) ctx.lineTo(pdX+x, _botY[x]);
  ctx.strokeStyle=lineG; ctx.lineWidth=1.4; ctx.stroke();

  const pulse=.72+Math.sin(vizPhase*2.2)*.28;
  [[14,.08],[7,.22],[2.5,.55],[1.2,.85]].forEach(([r,a])=>{
    ctx.beginPath(); ctx.arc(pdX,H/2,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${c2[0]},${c2[1]},${c2[2]},${a*pulse})`; ctx.fill();
  });
  ctx.beginPath(); ctx.arc(pdX,H/2,.8,0,Math.PI*2);
  ctx.fillStyle=`rgba(255,255,255,${.88*pulse})`; ctx.fill();

  ctx.beginPath(); ctx.moveTo(pdX,H*.08); ctx.lineTo(pdX,H*.92);
  ctx.strokeStyle=`rgba(${c2[0]},${c2[1]},${c2[2]},.18)`;
  ctx.lineWidth=.6; ctx.setLineDash([2,7]); ctx.stroke(); ctx.setLineDash([]);

  if (frozen) {
    ctx.fillStyle=`rgba(${c1[0]},${c1[1]},${c1[2]},.06)`; ctx.fillRect(0,0,W,H);
    ctx.fillStyle=`rgba(${c2[0]},${c2[1]},${c2[2]},.45)`;
    ctx.font='bold 8px Rajdhani,Helvetica'; ctx.textAlign='center';
    ctx.fillText('∞  FROZEN',W/2,H-8); ctx.textAlign='left';
  }

  DOM.tailFill.style.width = (P.decay.disp*100)+'%';
  vizPhase = (vizPhase + 0.018) % (Math.PI * 2);
}

}

function attachPointer(el, onStart, onMove, onEnd) {
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    try { el.setPointerCapture(e.pointerId); } catch(_) {}
    onStart(e.clientY);
  });
  el.addEventListener('pointermove', e => {
    if (e.buttons) onMove(e.clientY);
  });
  el.addEventListener('pointerup',     onEnd);
  el.addEventListener('pointercancel', onEnd);
}

// KNOB BUILDER
// ═══════════════════════════════════════════════════════
function makeKnob(id, sz, wrapCls, lblCls, valCls) {
  const p = P[id];
  const wrap = document.createElement('div'); wrap.className = wrapCls;
  const c    = document.createElement('canvas'); c.width = sz; c.height = sz;
  const lbl  = document.createElement('div');   lbl.className = lblCls; lbl.textContent = p.label;
  const val  = document.createElement('div');   val.className = valCls; val.textContent = p.fmt(p.value);
  wrap.append(c, lbl, val);
  drawKnob(c, p.disp);

  // Cache refs (Round 1)
  DOM.knobs[id] = c;
  DOM.vals[id]  = val;

  let ds = null;

  attachPointer(c,
    // start
    y => {
      ds = { y, n: p.norm };
      p.dragging = true;
      wrap.classList.add('dragging');
      showTT(id, c);
    },
    // move
    y => {
      if (!ds) return;
      const n = Math.max(0, Math.min(1, ds.n - (y - ds.y) / 158));
      p.norm  = n;
      p.value = p.min + n * (p.max - p.min);
      val.textContent = p.fmt(p.value);
      updTT(id);
      drawKnob(c, n, true);
      // IR params → rebuild reverb. EQ/mix params → instant via Web Audio graph.
      if (IR_PARAMS.has(id)) scheduleIR();
      else applyAudioMix();
      sendParam(id);
    },
    // end
    () => {
      if (!ds) return; ds = null;
      p.dragging = false;
      wrap.classList.remove('dragging');
      hideTT();
      // Snap
      for (const s of SNAP_POINTS) {
        if (Math.abs(p.norm - s) < SNAP_THRESHOLD && Math.abs(p.norm - s) > 0.001) {
          p.norm  = s;
          p.value = p.min + s * (p.max - p.min);
          val.textContent = p.fmt(p.value);
          val.classList.remove('snap'); void val.offsetWidth; val.classList.add('snap');
          sendParam(id);
          // Snap must also trigger the correct audio update
          if (IR_PARAMS.has(id)) scheduleIR(); else applyAudioMix();
          break;
        }
      }
      if (!IR_PARAMS.has(id)) applyAudioMix();
    }
  );

  c.addEventListener('dblclick', () => {
    p.norm  = (p.def - p.min) / (p.max - p.min);
    p.value = p.def;
    val.textContent = p.fmt(p.value);
    drawKnob(c, p.norm);
    if (IR_PARAMS.has(id)) scheduleIR(); else applyAudioMix();
    sendParam(id);
  });

  return wrap;
}

function renderLoop() {
  requestAnimationFrame(renderLoop); // schedule first — loop never dies
  if (document.hidden) return;       // skip when minimized — zero CPU
  try {
    springTick();
    for (const [id, p] of Object.entries(P)) {
      if (id === 'decay') continue;
      if (p.dragging) continue;
      if (Math.abs(p.disp - p._lastDrawn) < 0.0008) continue;
      const c = DOM.knobs[id];
      if (!c) continue;
      drawKnob(c, p.disp, false);
      p._lastDrawn = p.disp;
      const v = DOM.vals[id];
      if (v) v.textContent = p.fmt(p.min + p.disp * (p.max - p.min));
    }
    if (!P.decay.dragging && Math.abs(P.decay.disp - P.decay._lastDrawn) > 0.0008) {
      drawDecay(P.decay.disp);
      P.decay._lastDrawn = P.decay.disp;
    }
    drawViz();
  } catch(err) {
    console.warn('[VOID renderLoop]', err); // log but never stop
  }
}

let _irTimer = null;

  clearTimeout(_irTimer);
  _irTimer = setTimeout(buildIR, IR_DEBOUNCE_MS);
}

let actx=null, src=null, rev=null, dryG=null, wetG=null, hiF=null, loF=null;

// ═══════════════════════════════════════════════════════
// WEB WORKER — IR DSP runs off main thread (no DAW freeze)
// ═══════════════════════════════════════════════════════
let _irWorker  = null;
let _irPending = false;

const _WORKER_SRC = (function() {
const s = `
'use strict';

// Constants mirrored from main thread
const ALGO_MUL = {plate:0.45,hall:0.78,superhall:1.0,infinite:2.8};
const ALGO_CHAR = {
  plate:    {erSpread:0.28,erCount:8, densScale:2.2,tailBright:1.18,stereoW:0.55,shimmer:0.0 },
  hall:     {erSpread:0.72,erCount:14,densScale:0.9,tailBright:0.88,stereoW:0.82,shimmer:0.45},
  superhall:{erSpread:1.00,erCount:12,densScale:0.7,tailBright:0.92,stereoW:1.00,shimmer:0.80},
  infinite: {erSpread:1.40,erCount:6, densScale:0.4,tailBright:0.78,stereoW:1.20,shimmer:1.0 },
};

self.onmessage = function(ev) {
  try {
    const result = buildIR(ev.data);
    // Transfer ownership of ArrayBuffers — zero-copy to main thread
    self.postMessage({ok:true, L:result[0], R:result[1]}, [result[0], result[1]]);
  } catch(err) {
    self.postMessage({ok:false, err:err.message});
  }
};

function buildIR(p) {
  const sr        = p.sr;
  const algo      = p.algo;
  const frozen    = p.frozen;
  const mul       = ALGO_MUL[algo] || 1;
  const decayTime = frozen ? 24 : Math.min(p.decay * mul, 24);
  const irLen     = Math.floor(sr * Math.min(decayTime + 0.5, 25));

  const preSamp = Math.floor((p.predelay / 1000) * sr);
  const diff    = p.diffusion;
  const size    = 0.5 + (p.size / 100) * 0.5;
  const modD    = p.moddepth / 100;
  const modR    = p.modrate;
  const atkT    = Math.max(p.attack * 0.12, 0.001);
  const atkK    = 4.0;

  const hiMult   = Math.max(0.05, p.highmult);
  const loMult   = Math.max(0.05, p.lowmult);
  const hiXover  = p.highxover;
  const hiAbsorb = 1 - Math.exp(-2 * Math.PI * hiXover / sr / Math.max(hiMult, 0.05));
  const hiBlend  = Math.min(1.0, hiMult * 1.2);

  const ac       = ALGO_CHAR[algo] || ALGO_CHAR.superhall;
  const erCount  = ac.erCount;
  const erMaxMs  = (20 + size * 60) * ac.erSpread;
  const erDelays = Array.from({length:erCount}, function(_,i) {
    var t = (i+1)/erCount;
    return Math.floor((Math.pow(t,1.6)*erMaxMs/1000)*sr + preSamp);
  });
  const erGains  = erDelays.map(function(_,i) {
    return (0.62 - i*(0.5/erCount)) * (0.82 + Math.sin(i*1.9 + algo.length)*0.18);
  });

  const NUM_TAPS   = Math.round(4 + diff * 10);
  const tapD       = Array.from({length:NUM_TAPS}, function(_,i) {
    var t = (i+1)/NUM_TAPS;
    return Math.floor(sr*(0.005 + t*t*0.048*size));
  });
  const tapWeights = tapD.map(function(d) { return Math.exp(-d/(sr*size)); });

  // LFO
  const lfoLen = Math.ceil(sr * 0.05);
  const lfoL   = new Float32Array(lfoLen);
  const lfoR   = new Float32Array(lfoLen);
  if (modD > 0) {
    var lfoSm = Math.exp(-2*Math.PI*modR*3/sr), vL=0, vR=0;
    for (var li=0; li<lfoLen; li++) {
      vL = vL*lfoSm + (Math.random()*2-1)*(1-lfoSm);
      vR = vR*lfoSm + (Math.random()*2-1)*(1-lfoSm);
      lfoL[li]=vL; lfoR[li]=vR;
    }
  }

  // Pre-baked ER buffers
  var erB0 = new Float32Array(irLen), erB1 = new Float32Array(irLen);
  var erBufs = [erB0, erB1];
  for (var ch=0; ch<2; ch++) {
    for (var ei=0; ei<erCount; ei++) {
      var off = Math.round(ch*(3+ei*0.4)*ac.stereoW);
      var ri2 = erDelays[ei] + off;
      if (ri2 >= preSamp && ri2 < irLen)
        erBufs[ch][ri2] += ((ei+ch)%2===0 ? 1 : -1) * erGains[ei] * ac.tailBright;
    }
  }

  // Noise buffer
  var noiseLen = irLen + 8192;
  var noiseBuf = new Float32Array(noiseLen);
  for (var ni=0; ni<noiseLen; ni++) noiseBuf[ni] = Math.random()*2-1;

  // Attack table
  var atkSamps = Math.max(1, Math.floor(atkT*sr));
  var atkDen   = 1 - Math.exp(-atkK);
  var atkTable = new Float32Array(atkSamps);
  for (var ai=0; ai<atkSamps; ai++)
    atkTable[ai] = (1 - Math.exp(-atkK*ai/atkSamps)) / atkDen;

  // Iterative multipliers
  var densTime  = (0.01 + diff*0.12*size) * ac.densScale;
  var decayMult = Math.exp(-3.0 / (decayTime*sr));
  var densMult  = Math.exp(-1.0 / Math.max(densTime*sr, 1));

  // Output buffers (will be transferred)
  var outL = new Float32Array(irLen), outR = new Float32Array(irLen);
  var chs  = [outL, outR];

  for (var ch=0; ch<2; ch++) {
    var data      = chs[ch];
    var lfoTbl    = ch===0 ? lfoL : lfoR;
    var erBuf     = erBufs[ch];
    var seed      = ch * Math.floor(sr*0.00171*ac.stereoW);
    var noiseOff  = ch * Math.floor(irLen*0.37);
    var hiLP=0, decEnv=1.0, density=0.0;

    for (var i=0; i<irLen; i++) {
      var ri = i - seed;
      if (ri < preSamp || ri < 0) { data[i]=0; continue; }
      decEnv  *= decayMult;
      density  = 1 - (1-density)*densMult;
      var rs   = ri - preSamp;
      var aEnv = rs < atkSamps ? atkTable[rs] : 1.0;
      var ni2  = (i+noiseOff) % noiseBuf.length;
      var s    = noiseBuf[ni2] * density;
      if (diff < 0.9) {
        var echo = 0;
        for (var ti=0; ti<tapD.length; ti++) {
          if (ri > tapD[ti]) {
            var tni = (i+noiseOff+(ti+1)*2311) % noiseBuf.length;
            echo += noiseBuf[tni] * tapWeights[ti];
          }
        }
        s = s*diff + echo*(1-diff)*0.22;
      }
      var lfoV = modD>0 ? lfoTbl[i%lfoLen]*modD*0.11 : 0;
      var erV  = erBuf[ri];
      var smp  = (s+erV)*decEnv*aEnv*size*ac.tailBright*(1+lfoV)*(ch===0?1.0:0.965);
      hiLP    += hiAbsorb*(smp-hiLP);
      smp      = hiLP*(1-hiBlend) + smp*hiBlend;
      if (Math.abs(loMult-1.0) > 0.02) smp += hiLP*(loMult-1.0)*0.3;
      data[i] = smp;
    }
  }

  // Shimmer
  var shimAmt = ac.shimmer * (0.5 + diff*0.5);
  if (shimAmt > 0.01 && irLen > preSamp+100) {
    var shimOnset = preSamp + Math.floor(sr*0.06);
    for (var ch=0; ch<2; ch++) {
      var d    = chs[ch];
      var snap = d.slice(0, irLen);
      var det  = ch===0 ? 1.000 : 1.004;
      [[2.0*det, 0.24*shimAmt],[1.498*det, 0.14*shimAmt]].forEach(function(v) {
        var ratio=v[0], gain=v[1];
        var bMul  = Math.exp(-12/sr);
        var sdMul = Math.exp(-2.8/(decayTime*sr));
        var bEnv=0.0, sdEnv=1.0;
        for (var i=shimOnset; i<irLen; i++) {
          bEnv  = 1-(1-bEnv)*bMul;
          sdEnv *= sdMul;
          var sp = shimOnset+(i-shimOnset)*ratio;
          var si = Math.floor(sp);
          if (si >= irLen-1) break;
          var sf = sp-si;
          d[i] += (snap[si]*(1-sf) + snap[si+1]*sf) * gain * bEnv * sdEnv;
        }
      });
    }
  }

  // IR fade-in 2ms
  var fi = Math.floor(sr*0.002);
  for (var ch=0; ch<2; ch++) {
    var d = chs[ch];
    for (var i=preSamp; i<Math.min(preSamp+fi,irLen); i++) {
      var f=(i-preSamp)/fi; d[i]*=f*f;
    }
  }

  // Tail fade-out 60ms
  var fo=Math.floor(sr*0.06), fs=irLen-fo;
  for (var ch=0; ch<2; ch++) {
    var d=chs[ch];
    for (var i=Math.max(0,fs); i<irLen; i++) {
      var f=(irLen-i)/fo; d[i]*=f*f;
    }
  }

  // Modal resonances
  var mFreqs = {
    plate:    [520,940,1380,2100,3200],
    hall:     [82,165,310,580,1050],
    superhall:[55,110,220,440,880],
    infinite: [35,68,135,270,540]
  }[algo] || [55,110,220,440,880];
  var mGain = Math.min(0.06+diff*0.04, 0.09);
  for (var ch=0; ch<2; ch++) {
    var d=chs[ch];
    for (var mi=0; mi<mFreqs.length; mi++) {
      var ds = Math.round(sr/mFreqs[mi]);
      if (ds<1||ds>=irLen) continue;
      for (var i=ds; i<irLen; i++) {
        d[i] += d[i-ds]*mGain;
        if (d[i]>1) d[i]=1; else if (d[i]<-1) d[i]=-1;
      }
    }
  }

  // Normalize -3dBFS
  var peak=0;
  for (var ch=0; ch<2; ch++) { var d=chs[ch]; for (var i=0;i<irLen;i++){var a=Math.abs(d[i]);if(a>peak)peak=a;} }
  if (peak > 0.001) {
    var norm=0.707/peak;
    for (var ch=0; ch<2; ch++) { var d=chs[ch]; for (var i=0;i<irLen;i++) d[i]*=norm; }
  }

  return [outL.buffer, outR.buffer];
}
`;
return s;
})();

function _ensureWorker() {
  if (_irWorker) return _irWorker;
  const blob = new Blob([_WORKER_SRC], {type:'application/javascript'});
  _irWorker  = new Worker(URL.createObjectURL(blob));
  _irWorker.onmessage = function(ev) {
    _irPending = false;
    if (!ev.data.ok) { console.warn('[VOID Worker]', ev.data.err); return; }
    if (!actx) return;
    try {
      const irLen = ev.data.L.byteLength / 4;
      const abuf  = actx.createBuffer(2, irLen, actx.sampleRate);
      abuf.copyToChannel(new Float32Array(ev.data.L), 0);
      abuf.copyToChannel(new Float32Array(ev.data.R), 1);
      rev.buffer = abuf;
    } catch(err) { console.warn('[VOID IR apply]', err); }
    // ── IR Bridge: send IR to C++ backend ──
    try {
      const fullSR  = actx.sampleRate;
      const fullLen = ev.data.L.byteLength / 4;
      const fullL   = new Float32Array(ev.data.L);
      const fullR   = new Float32Array(ev.data.R);
      // Downsample to 8000 Hz to keep URL size manageable (~200KB base64 max)
      const TARGET_SR = 8000;
      const ratio  = fullSR / TARGET_SR;
      const outLen = Math.max(1, Math.floor(fullLen / ratio));
      const dsL = new Float32Array(outLen);
      const dsR = new Float32Array(outLen);
      for (let i = 0; i < outLen; i++) {
        const s = Math.min(Math.floor(i * ratio), fullLen - 1);
        dsL[i] = fullL[s];
        dsR[i] = fullR[s];
      }
      // Pack as int16: L channel first, then R channel
      const int16 = new Int16Array(outLen * 2);
      for (let i = 0; i < outLen; i++) {
        int16[i]        = Math.max(-32767, Math.min(32767, Math.round(dsL[i] * 32767)));
        int16[i+outLen] = Math.max(-32767, Math.min(32767, Math.round(dsR[i] * 32767)));
      }
      // Base64 encode in chunks to avoid call-stack overflow
      const bytes = new Uint8Array(int16.buffer);
      let b64 = '';
      const BCHUNK = 3072;
      for (let i = 0; i < bytes.length; i += BCHUNK) {
        b64 += btoa(String.fromCharCode.apply(null, bytes.subarray(i, i + BCHUNK)));
      }
      _jb.src = `juce://ir?sr=${TARGET_SR}&len=${outLen}&data=${encodeURIComponent(b64)}`;
    } catch(e) { console.warn('[VOID IR bridge]', e); }
  };
  _irWorker.onerror = function(ev) {
    _irPending = false;
    console.warn('[VOID Worker error]', ev.message);
  };
  return _irWorker;
}

function buildIR() {
  if (!actx) return;
  if (_irPending) { scheduleIR(); return; } // busy — reschedule
  _irPending = true;
  try {
    _ensureWorker().postMessage({
      sr:       actx.sampleRate,
      algo,
      frozen,
      decay:    P.decay.value,
      predelay: P.predelay.value,
      diffusion:P.diffusion.value,
      size:     P.size.value,
      moddepth: P.moddepth.value,
      modrate:  P.modrate.value,
      attack:   P.attack.value,
      highmult: P.highmult.value,
      lowmult:  P.lowmult.value,
      highxover:P.highxover.value,
    });
  } catch(err) {
    _irPending = false;
    console.warn('[VOID buildIR]', err);
  }
}

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  dryG = actx.createGain();
  wetG = actx.createGain();
  // EQ on WET RETURN — filters the reverb output, not the input
  hiF  = actx.createBiquadFilter(); hiF.type = 'lowpass';
  loF  = actx.createBiquadFilter(); loF.type = 'highpass';
  rev  = actx.createConvolver();
  // Wet chain: rev → loF(highpass) → hiF(lowpass) → wetG
  rev.connect(loF); loF.connect(hiF); hiF.connect(wetG);
  buildIR();
  actx.addEventListener?.('statechange', () => {
    if (actx.state === 'suspended' && !document.hidden) actx.resume().catch(()=>{});
  });
}

function connectGraph() {
  if (!actx || !src) return;
  try { src.disconnect(); } catch(e) {}
  // Dry: src → dryG → out
  // Wet: src → rev → loF → hiF → wetG → out
  src.connect(dryG);
  src.connect(rev);
  dryG.connect(actx.destination);
  wetG.connect(actx.destination);
}

function applyAudioMix() {
  if (!actx) return;
  const mix = P.mix.value / 100, t = actx.currentTime;
  if (bypassed) {
    dryG.gain.setTargetAtTime(1, t, 0.02);
    wetG.gain.setTargetAtTime(0, t, 0.02);
  } else {
    dryG.gain.setTargetAtTime(1 - mix, t, 0.02);
    wetG.gain.setTargetAtTime(mix,     t, 0.02);
  }
  hiF.frequency.setTargetAtTime(P.highcut.value, t, 0.02);
  loF.frequency.setTargetAtTime(P.lowcut.value,  t, 0.02);
}

document.addEventListener('visibilitychange', () => {
  if (!actx || document.hidden) return;
  if (actx.state === 'suspended') actx.resume().catch(() => {});
});

// iOS: unlock audio on first touch
document.addEventListener('pointerdown', () => {
  if (actx && actx.state === 'suspended') actx.resume().catch(() => {});
}, { once: true });

let _presetIdx = 0;

function applyPreset(idx) {
  const pr = PRESETS[idx];
  if (!pr) return;
  // Set algorithm
  algo = pr.algo;
  document.querySelectorAll('.ab').forEach(b => b.classList.toggle('on', b.dataset.a === algo));
  updateAlgoAura(algo);
  // Set all params
  Object.entries(pr.p).forEach(([id, val]) => {
    const p = P[id]; if (!p) return;
    p.value      = val;
    p.norm       = Math.max(0, Math.min(1, (val - p.min) / (p.max - p.min)));
    p.disp       = p.norm;
    p.vel        = 0;
    p._lastDrawn = -1;
    const el = DOM.vals[id];
    if (el) el.textContent = p.fmt(p.value);
  });
  // Update decay display
  if (DOM.decN) DOM.decN.textContent = P.decay.fmt(P.decay.value);
  // Update preset name label
  const lbl = document.getElementById('presetName');
  if (lbl) lbl.textContent = pr.name;
  // Rebuild IR + update mix
  scheduleIR();
  applyAudioMix();
}

function buildPresetControls() {
  const nameEl   = document.getElementById('presetName');
  const drop     = document.getElementById('presetDrop');
  const backdrop = document.getElementById('presetBackdrop');

  // Build items
  PRESETS.forEach((pr, i) => {
    const item = document.createElement('div');
    item.className = 'preset-drop-item' + (i === 0 ? ' active' : '');
    const dot = document.createElement('span'); dot.className = 'pdot';
    const txt = document.createElement('span'); txt.textContent = pr.name;
    item.append(dot, txt);
    item.addEventListener('click', () => { _presetIdx = i; applyPreset(i); closeDrop(); });
    drop.appendChild(item);
  });

  function openDrop() {
    drop.querySelectorAll('.preset-drop-item').forEach((el, i) =>
      el.classList.toggle('active', i === _presetIdx));
    drop.classList.add('visible');
    backdrop.classList.add('visible');
    nameEl.classList.add('open');
  }
  function closeDrop() {
    drop.classList.remove('visible');
    backdrop.classList.remove('visible');
    nameEl.classList.remove('open');
  }

  nameEl.addEventListener('click',    e => { e.stopPropagation(); drop.classList.contains('visible') ? closeDrop() : openDrop(); });
  backdrop.addEventListener('click',  closeDrop);

  document.getElementById('presetPrev').addEventListener('click', e => {
    e.stopPropagation();
    _presetIdx = (_presetIdx - 1 + PRESETS.length) % PRESETS.length;
    applyPreset(_presetIdx); closeDrop();
  });
  document.getElementById('presetNext').addEventListener('click', e => {
    e.stopPropagation();
    _presetIdx = (_presetIdx + 1) % PRESETS.length;
    applyPreset(_presetIdx); closeDrop();
  });
}

  document.addEventListener('click', function _resume() {
    actx.resume().catch(() => {});
    document.removeEventListener('click', _resume);
  }, { once: true });
