name: Build VOID Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake ninja

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-7.0.12-${{ runner.os }}

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Sign and collect artifacts
        run: |
          mkdir -p artifacts
          VST3=$(find build -name "*.vst3" -type d | head -1)
          if [ -n "$VST3" ]; then
            cp -r "$VST3" artifacts/
            codesign --force --deep --sign - artifacts/*.vst3
            xattr -cr artifacts/*.vst3
          fi
          ls -la artifacts/

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: VOID-VST3-macOS
          path: artifacts/*.vst3
